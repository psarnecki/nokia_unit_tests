line-length = 150
target-version = "py311"
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

[lint]
select = [
   # "ANN", # flake8-annotations
   "ARG", # flake8-arg-names
   "ASYNC", # flake8-async
   # "B",   # flake8-bugbear
   "C",   # McCabe complexity
   "E",   # pycodestyle
   "F",   # Pyflakes
   "FA",  # flake8-annotations-complexity
   "FAST",# FastAPI
   # "FBT", # flake8-boolean-trap
   "FURB",# refurb
   # "G",   # flake8-logging-format
   "I",   # isort
   "UP",  # pyupgrade,
   # "PERF", # flake8-performance
   "PTH", # flake8-pathlib
   "SIM", # flake8-simplify
   "W",   # warnings
   "T20", # flake8-print
]

ignore = ["ASYNC109"]

## Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"


[lint.mccabe]
max-complexity = 21

[lint.per-file-ignores]
"examples/*" = ["T20"]
"test/*" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
skip-magic-trailing-comma = false
line-ending = "auto"


[lint.isort]
combine-as-imports = true
split-on-trailing-comma = true
